version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg15
    environment:
      POSTGRES_PASSWORD: meshcore
      POSTGRES_USER: meshcore
      POSTGRES_DB: meshcore
    volumes:
      - timescale-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://meshcore:meshcore@timescaledb:5432/meshcore
      INGEST_PORT: 8080
    depends_on:
      - timescaledb
    ports:
      - "8080:8080"

  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: meshcore
    depends_on:
      - timescaledb

volumes:
  timescale-data:
